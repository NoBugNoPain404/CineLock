services:
  redis:
    container_name: redis_cache
    image: redis:7.2-alpine

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    env_file:
      - .env

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - cinelock_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis_data:
