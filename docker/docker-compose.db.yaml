services:
  db:
    container_name: postgres_db
    image: postgres:17.9-alpine3.23

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - cinelock_network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    shm_size: 256mb

    stop_grace_period: 30s

    security_opt:
      - no-new-privileges:true

volumes:
  db_data:
